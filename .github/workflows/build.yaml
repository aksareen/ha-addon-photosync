name: Build and publish

on:
  push:
    branches: [master]
    paths:
      - "photosync/**"

env:
  ADDON: photosync

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [amd64, aarch64, armv7, i386]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get add-on version
        id: version
        run: |
          version=$(grep '^version:' ${{ env.ADDON }}/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Map arch to platform
        id: platform
        run: |
          case "${{ matrix.arch }}" in
            amd64)   echo "platform=linux/amd64" >> "$GITHUB_OUTPUT" ;;
            aarch64) echo "platform=linux/arm64" >> "$GITHUB_OUTPUT" ;;
            armv7)   echo "platform=linux/arm/v7" >> "$GITHUB_OUTPUT" ;;
            i386)    echo "platform=linux/386" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Get base image
        id: base
        run: |
          base=$(grep '${{ matrix.arch }}:' ${{ env.ADDON }}/build.yaml | awk '{print $2}')
          echo "image=$base" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.ADDON }}
          file: ./${{ env.ADDON }}/Dockerfile
          push: true
          platforms: ${{ steps.platform.outputs.platform }}
          build-args: |
            BUILD_FROM=${{ steps.base.outputs.image }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-addon-photosync/${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-addon-photosync/${{ matrix.arch }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
