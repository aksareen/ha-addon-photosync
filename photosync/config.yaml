name: PhotoSync
version: "0.5.2"
slug: photosync
description: Sync photos from Koofr cloud to USB drives
url: https://github.com/aksareen/ha-addon-photosync
arch:
  - amd64
  - aarch64
  - armv7
  - i386
ingress: true
ingress_port: 8099
panel_icon: mdi:camera
panel_title: PhotoSync
init: false
homeassistant_api: true
map:
  - media:rw
  - share:rw
options:
  koofr_email: ""
  koofr_password: ""
  remote_path: "/PhotoSync"
  folder_name: "PhotoSync"
  notify_service: ""
  batch_size_mb: 5000
  exclude_patterns:
    - ".DS_Store"
    - "Thumbs.db"
    - ".Spotlight-V100"
    - ".fseventsd"
    - ".Trashes"
    - "._*"
schema:
  koofr_email: "email"
  koofr_password: "password"
  remote_path: "str"
  folder_name: "str"
  notify_service: "str?"
  batch_size_mb: "int?"
  exclude_patterns:
    - "str"
